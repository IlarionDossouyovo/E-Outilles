<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- Industrial Yellow Gradient -->
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC400"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    
    <!-- Electric Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Metallic Steel Gradient -->
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="30%" style="stop-color:#8A8A8A"/>
      <stop offset="50%" style="stop-color:#A0A0A0"/>
      <stop offset="70%" style="stop-color:#8A8A8A"/>
      <stop offset="100%" style="stop-color:#5A5A5A"/>
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background (optional - remove for transparent) -->
  <rect width="400" height="120" fill="none"/>
  
  <!-- ICON: Stylized E with Lightning Bolt -->
  <g transform="translate(20, 15)" filter="url(#shadow)">
    <!-- Outer ring/gear shape -->
    <circle cx="45" cy="45" r="42" fill="none" stroke="url(#steelGrad)" stroke-width="3"/>
    
    <!-- Gear teeth (8 teeth) -->
    <g fill="url(#steelGrad)">
      <rect x="42" y="0" width="6" height="8" rx="1"/>
      <rect x="42" y="82" width="6" height="8" rx="1"/>
      <rect x="0" y="42" width="8" height="6" rx="1"/>
      <rect x="82" y="42" width="8" height="6" rx="1"/>
      <rect x="12" y="12" width="6" height="6" rx="1"/>
      <rect x="72" y="12" width="6" height="6" rx="1"/>
      <rect x="12" y="72" width="6" height="6" rx="1"/>
      <rect x="72" y="72" width="6" height="6" rx="1"/>
    </g>
    
    <!-- Inner circle -->
    <circle cx="45" cy="45" r="30" fill="#121212" stroke="url(#yellowGrad)" stroke-width="2"/>
    
    <!-- Stylized E shape with Lightning -->
    <g transform="translate(28, 25)">
      <!-- Main E vertical bar -->
      <path d="M0 0 L0 40 L6 40 L6 34 L6 34" fill="url(#yellowGrad)" filter="url(#glow)"/>
      
      <!-- E horizontal bars -->
      <rect x="0" y="0" width="22" height="6" fill="url(#yellowGrad)" filter="url(#glow)"/>
      <rect x="0" y="17" width="18" height="6" fill="url(#yellowGrad)" filter="url(#glow)"/>
      <rect x="0" y="34" width="22" height="6" fill="url(#yellowGrad)" filter="url(#glow)"/>
      
      <!-- Lightning bolt integrated into E -->
      <path d="M28 8 L22 22 L28 22 L20 40 L34 22 L28 22 L34 8 Z" fill="url(#yellowGrad)" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- TEXT: E-Outille -->
  <g transform="translate(115, 45)">
    <text x="0" y="0" font-family="'Trebuchet MS', 'Gill Sans', Arial, sans-serif" font-size="42" font-weight="bold" fill="#121212" letter-spacing="-1">
      E-
      <tspan fill="url(#yellowGrad)">Outille</tspan>
    </text>
  </g>
  
  <!-- TEXT: By ELECTRON (smaller) -->
  <g transform="translate(115, 75)">
    <text x="0" y="0" font-family="'Trebuchet MS', 'Gill Sans', Arial, sans-serif" font-size="16" font-weight="600" fill="#5A5A5A" letter-spacing="8">
      BY ELECTRON
    </text>
  </g>
  
  <!-- Tagline -->
  <g transform="translate(285, 75)">
    <text x="0" y="0" font-family="'Trebuchet MS', Arial, sans-serif" font-size="12" fill="#8A8A8A" letter-spacing="2">
      PROFESSIONAL TOOLS
    </text>
  </g>
</svg>