<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <!-- Gradient for metallic effect -->
    <linearGradient id="metalGradLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#666666"/>
      <stop offset="50%" style="stop-color:#444444"/>
      <stop offset="100%" style="stop-color:#222222"/>
    </linearGradient>
    <!-- Yellow glow -->
    <linearGradient id="yellowGlowLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFC400"/>
    </linearGradient>
    <!-- Lightning gradient -->
    <linearGradient id="boltGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDD00"/>
      <stop offset="50%" style="stop-color:#FFC400"/>
      <stop offset="100%" style="stop-color:#FFAA00"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <!-- Glow effect -->
    <filter id="glowLight">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="80" fill="#FFFFFF"/>
  
  <!-- Icon Group -->
  <g transform="translate(15, 10)" filter="url(#shadowLight)">
    <!-- Outer gear ring -->
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#metalGradLight)" stroke-width="3"/>
    <!-- Gear teeth -->
    <g fill="url(#metalGradLight)">
      <rect x="26" y="0" width="8" height="8" rx="1"/>
      <rect x="26" y="52" width="8" height="8" rx="1"/>
      <rect x="0" y="26" width="8" height="8" rx="1"/>
      <rect x="52" y="26" width="8" height="8" rx="1"/>
      <rect x="8" y="8" width="7" height="7" rx="1" transform="rotate(45 11.5 11.5)"/>
      <rect x="45" y="8" width="7" height="7" rx="1" transform="rotate(45 48.5 11.5)"/>
      <rect x="8" y="45" width="7" height="7" rx="1" transform="rotate(45 11.5 48.5)"/>
      <rect x="45" y="45" width="7" height="7" rx="1" transform="rotate(45 48.5 48.5)"/>
    </g>
    
    <!-- Inner circle -->
    <circle cx="30" cy="30" r="18" fill="#FFFFFF" stroke="url(#yellowGlowLight)" stroke-width="2"/>
    
    <!-- Stylized E -->
    <path d="M22 20 L40 20 L40 24 L27 24 L27 28 L38 28 L38 32 L27 32 L27 40 L42 40 L42 44 L22 44 Z" fill="#121212"/>
    
    <!-- Lightning bolt overlay -->
    <path d="M36 18 L30 30 L34 30 L28 46 L40 28 L35 28 L38 18 Z" fill="url(#boltGradLight)" filter="url(#glowLight)"/>
  </g>
  
  <!-- Text: E-Outille -->
  <g transform="translate(90, 38)" filter="url(#shadowLight)">
    <!-- E -->
    <path d="M0 0 L28 0 L28 6 L10 6 L10 14 L24 14 L24 20 L10 20 L10 28 L28 28 L28 34 L0 34 Z" fill="#121212"/>
    <!-- - -->
    <rect x="34" y="12" width="12" height="10" fill="#FFC400"/>
    <!-- Outille -->
    <text x="52" y="26" font-family="Arial Black, Helvetica, sans-serif" font-size="28" font-weight="900" fill="#121212" letter-spacing="-1">Outille</text>
  </g>
  
  <!-- ELECTRON subtitle -->
  <g transform="translate(240, 55)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#666666" letter-spacing="4" font-weight="500">PAR ELECTRON</text>
  </g>
  
  <!-- Accent line -->
  <rect x="90" y="48" width="120" height="2" fill="#FFC400" opacity="0.8"/>
</svg>