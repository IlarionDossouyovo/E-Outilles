<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100">
  <defs>
    <linearGradient id="yellowGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6B800"/>
      <stop offset="50%" style="stop-color:#CC9900"/>
      <stop offset="100%" style="stop-color:#B38600"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="steelGradDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3A3A3A"/>
      <stop offset="50%" style="stop-color:#606060"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
  </defs>
  
  <!-- Light Background -->
  <rect width="500" height="100" fill="#FFFFFF"/>
  
  <!-- ICON -->
  <g transform="translate(25, 15)">
    <circle cx="35" cy="35" r="30" fill="none" stroke="url(#steelGradDark)" stroke-width="2"/>
    <circle cx="35" cy="35" r="22" fill="#F5F5F5" stroke="url(#yellowGradDark)" stroke-width="1.5"/>
    <g transform="translate(20, 18)">
      <rect x="0" y="0" width="16" height="4" fill="url(#yellowGradDark)" filter="url(#glow)"/>
      <rect x="0" y="10" width="14" height="4" fill="url(#yellowGradDark)" filter="url(#glow)"/>
      <rect x="0" y="20" width="16" height="4" fill="url(#yellowGradDark)" filter="url(#glow)"/>
      <path d="M22 6 L17 16 L22 16 L16 30 L28 16 L23 16 L28 6 Z" fill="url(#yellowGradDark)" filter="url(#glow)"/>
    </g>
  </g>
  
  <!-- TEXT -->
  <g transform="translate(100, 52)">
    <text x="0" y="0" font-family="Arial Black, Gadget, sans-serif" font-size="36" font-weight="900" fill="#121212" letter-spacing="-1">
      E-
      <tspan fill="url(#yellowGradDark)">Outille</tspan>
    </text>
  </g>
  
  <g transform="translate(100, 75)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#606060" letter-spacing="6">
      BY ELECTRON
    </text>
  </g>
  
  <!-- Accent line -->
  <rect x="100" y="82" width="180" height="2" fill="url(#yellowGradDark)"/>
</svg>