<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Gradient for metallic effect -->
    <linearGradient id="metalIcon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#B8B8B8"/>
      <stop offset="100%" style="stop-color:#888888"/>
    </linearGradient>
    <!-- Yellow glow -->
    <linearGradient id="yellowIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFC400"/>
    </linearGradient>
    <!-- Lightning gradient -->
    <linearGradient id="boltIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDD00"/>
      <stop offset="50%" style="stop-color:#FFC400"/>
      <stop offset="100%" style="stop-color:#FFAA00"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadowIcon" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Glow effect -->
    <filter id="glowIcon">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Transparent background - ready for any use -->
  <!-- Optional dark background for dark mode apps -->
  <!-- <rect width="128" height="128" fill="#121212" rx="16"/> -->
  
  <!-- Icon Group - Centered -->
  <g transform="translate(34, 24)" filter="url(#shadowIcon)">
    <!-- Outer gear ring -->
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#metalIcon)" stroke-width="3"/>
    <!-- Gear teeth -->
    <g fill="url(#metalIcon)">
      <rect x="26" y="0" width="8" height="8" rx="1"/>
      <rect x="26" y="52" width="8" height="8" rx="1"/>
      <rect x="0" y="26" width="8" height="8" rx="1"/>
      <rect x="52" y="26" width="8" height="8" rx="1"/>
      <rect x="8" y="8" width="7" height="7" rx="1" transform="rotate(45 11.5 11.5)"/>
      <rect x="45" y="8" width="7" height="7" rx="1" transform="rotate(45 48.5 11.5)"/>
      <rect x="8" y="45" width="7" height="7" rx="1" transform="rotate(45 11.5 48.5)"/>
      <rect x="45" y="45" width="7" height="7" rx="1" transform="rotate(45 48.5 48.5)"/>
    </g>
    
    <!-- Inner circle -->
    <circle cx="30" cy="30" r="18" fill="none" stroke="url(#yellowIcon)" stroke-width="2"/>
    
    <!-- Stylized E -->
    <path d="M22 20 L40 20 L40 24 L27 24 L27 28 L38 28 L38 32 L27 32 L27 40 L42 40 L42 44 L22 44 Z" fill="url(#yellowIcon)" filter="url(#glowIcon)"/>
    
    <!-- Lightning bolt overlay -->
    <path d="M36 18 L30 30 L34 30 L28 46 L40 28 L35 28 L38 18 Z" fill="url(#boltIcon)" opacity="0.9"/>
  </g>
</svg>