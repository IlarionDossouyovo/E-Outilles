<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Transparent background -->
  <rect width="400" height="120" fill="none"/>
  
  <!-- ICON: Black version -->
  <g transform="translate(20, 15)" filter="url(#shadow)">
    <circle cx="45" cy="45" r="42" fill="none" stroke="#000000" stroke-width="3"/>
    <g fill="#000000">
      <rect x="42" y="0" width="6" height="10" rx="1"/>
      <rect x="42" y="80" width="6" height="10" rx="1"/>
      <rect x="0" y="42" width="10" height="6" rx="1"/>
      <rect x="80" y="42" width="10" height="6" rx="1"/>
      <rect x="10" y="10" width="8" height="8" rx="1"/>
      <rect x="72" y="10" width="8" height="8" rx="1"/>
      <rect x="10" y="72" width="8" height="8" rx="1"/>
      <rect x="72" y="72" width="8" height="8" rx="1"/>
    </g>
    <circle cx="45" cy="45" r="30" fill="#000000"/>
    <g transform="translate(28, 25)">
      <rect x="0" y="0" width="22" height="6" fill="#FFFFFF"/>
      <rect x="0" y="17" width="18" height="6" fill="#FFFFFF"/>
      <rect x="0" y="34" width="22" height="6" fill="#FFFFFF"/>
      <path d="M28 8 L22 22 L28 22 L20 40 L34 22 L28 22 L34 8 Z" fill="#FFFFFF"/>
    </g>
  </g>
  
  <!-- TEXT -->
  <g transform="translate(115, 45)">
    <text x="0" y="0" font-family="Arial Black, Gadget, sans-serif" font-size="42" font-weight="900" fill="#000000" letter-spacing="-1">
      E-<tspan fill="#000000">Outille</tspan>
    </text>
  </g>
  
  <g transform="translate(115, 75)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#000000" letter-spacing="8">
      BY ELECTRON
    </text>
  </g>
</svg>