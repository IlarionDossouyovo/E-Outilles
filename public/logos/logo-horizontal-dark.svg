<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100">
  <defs>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC400"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="50%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#5A5A5A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Dark Background -->
  <rect width="500" height="100" fill="#121212"/>
  
  <!-- ICON -->
  <g transform="translate(25, 15)" filter="url(#shadow)">
    <circle cx="35" cy="35" r="30" fill="none" stroke="url(#steelGrad)" stroke-width="2"/>
    <circle cx="35" cy="35" r="22" fill="#1A1A1A" stroke="url(#yellowGrad)" stroke-width="1.5"/>
    <g transform="translate(20, 18)">
      <rect x="0" y="0" width="16" height="4" fill="url(#yellowGrad)" filter="url(#glow)"/>
      <rect x="0" y="10" width="14" height="4" fill="url(#yellowGrad)" filter="url(#glow)"/>
      <rect x="0" y="20" width="16" height="4" fill="url(#yellowGrad)" filter="url(#glow)"/>
      <path d="M22 6 L17 16 L22 16 L16 30 L28 16 L23 16 L28 6 Z" fill="url(#yellowGrad)" filter="url(#glow)"/>
    </g>
  </g>
  
  <!-- TEXT -->
  <g transform="translate(100, 52)">
    <text x="0" y="0" font-family="Arial Black, Gadget, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" letter-spacing="-1">
      E-
      <tspan fill="url(#yellowGrad)">Outille</tspan>
    </text>
  </g>
  
  <g transform="translate(100, 75)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8A8A8A" letter-spacing="6">
      BY ELECTRON
    </text>
  </g>
  
  <!-- Accent line -->
  <rect x="100" y="82" width="180" height="2" fill="url(#yellowGrad)"/>
</svg>