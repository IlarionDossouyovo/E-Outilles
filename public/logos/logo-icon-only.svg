<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC400"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="30%" style="stop-color:#8A8A8A"/>
      <stop offset="50%" style="stop-color:#A0A0A0"/>
      <stop offset="70%" style="stop-color:#8A8A8A"/>
      <stop offset="100%" style="stop-color:#5A5A5A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="1" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Transparent background -->
  <rect width="120" height="120" fill="none"/>
  
  <!-- Main Icon Group -->
  <g transform="translate(60, 60)" filter="url(#shadow)">
    <!-- Outer gear ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#steelGrad)" stroke-width="4"/>
    
    <!-- Gear teeth (12 teeth) -->
    <g fill="url(#steelGrad)">
      <rect x="-4" y="-54" width="8" height="12" rx="2"/>
      <rect x="-4" y="42" width="8" height="12" rx="2"/>
      <rect x="-54" y="-4" width="12" height="8" rx="2"/>
      <rect x="42" y="-4" width="12" height="8" rx="2"/>
      <rect x="-38" y="-38" width="8" height="8" rx="2"/>
      <rect x="30" y="-38" width="8" height="8" rx="2"/>
      <rect x="-38" y="30" width="8" height="8" rx="2"/>
      <rect x="30" y="30" width="8" height="8" rx="2"/>
    </g>
    
    <!-- Inner dark circle -->
    <circle cx="0" cy="0" r="38" fill="#121212"/>
    
    <!-- Metallic ring -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#steelGrad)" stroke-width="1" opacity="0.5"/>
    
    <!-- E + Lightning symbol -->
    <g transform="translate(-25, -30)">
      <!-- E horizontal bars -->
      <rect x="0" y="0" width="28" height="6" fill="url(#yellowGrad)" filter="url(#glow)"/>
      <rect x="0" y="16" width="22" height="6" fill="url(#yellowGrad)" filter="url(#glow)"/>
      <rect x="0" y="32" width="28" height="6" fill="url(#yellowGrad)" filter="url(#glow)"/>
      <rect x="0" y="48" width="5" height="18" fill="url(#yellowGrad)" filter="url(#glow)"/>
      
      <!-- Lightning bolt -->
      <path d="M34 8 L26 24 L34 24 L24 48 L44 22 L36 22 L44 8 Z" fill="url(#yellowGrad)" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.85;1" dur="1.5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>